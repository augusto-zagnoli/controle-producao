<header class="topbar" *ngIf="auth.logado">
  <h1>Controle de Produção - Tornearia</h1>
  <nav>
    @if (auth.isAdmin) {
      <a routerLink="/admin" routerLinkActive="active">Administrativo</a>
    }
    <a routerLink="/producao" routerLinkActive="active">Produção</a>
    <span class="usuario">{{ auth.usuario?.nome }}</span>
    <button class="btn-logout" (click)="logout()">Sair</button>
  </nav>
</header>

<main>
  <router-outlet />
</main>
