<section class="login-page">
  <div class="login-card">
    <h1>Controle de Produção</h1>
    <p class="subtitle">Tornearia — Faça login para continuar</p>
    <form [formGroup]="form" (ngSubmit)="entrar()" class="form">
      <label>
        Login
        <input formControlName="login" autocomplete="username" />
      </label>
      <label>
        Senha
        <input formControlName="senha" type="password" autocomplete="current-password" />
      </label>
      @if (erro) {
        <p class="erro">{{ erro }}</p>
      }
      <button type="submit" class="btn primary" [disabled]="carregando">
        {{ carregando ? 'Aguarde...' : 'Entrar' }}
      </button>
    </form>
    <p class="hint">Admin: <code>admin / admin123</code> &nbsp;|&nbsp; Técnico: <code>tecnico / tecnico123</code></p>
  </div>
</section>
